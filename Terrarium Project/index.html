<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrarium Project</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>🌿 My Terrarium 🌿</h1>
    
    <div class="main-container">
        <!-- LEFT PLANTS -->
        <div class="plants-container left-plants">
            <h2>Left Plants</h2>
            <div class="plants-list">
                <div class="plant" draggable="true" data-plant="🌵">
                    <p>🌵</p>
                    <span>Cactus</span>
                </div>
                <div class="plant" draggable="true" data-plant="🌻">
                    <p>🌻</p>
                    <span>Flower</span>
                </div>
                <div class="plant" draggable="true" data-plant="🌱">
                    <p>🌱</p>
                    <span>Seedling</span>
                </div>
            </div>
        </div>

        <!-- CENTER TERRARIUM -->
        <div class="terrarium-container">
            <div class="terrarium" id="terrarium">
                <div class="jar-top"></div>
                <div class="jar-body"></div>
                <div class="soil"></div>
                <div id="plants-area" class="plants-area">
                    <p class="drop-hint">Drop plants here!</p>
                </div>
            </div>
        </div>

        <!-- RIGHT PLANTS -->
        <div class="plants-container right-plants">
            <h2>Right Plants</h2>
            <div class="plants-list">
                <div class="plant" draggable="true" data-plant="🌿">
                    <p>🌿</p>
                    <span>Leaf</span>
                </div>
                <div class="plant" draggable="true" data-plant="🍀">
                    <p>🍀</p>
                    <span>Clover</span>
                </div>
                <div class="plant" draggable="true" data-plant="🌾">
                    <p>🌾</p>
                    <span>Grass</span>
                </div>
            </div>
        </div>
    </div>

    <div class="reset-container">
        <button id="reset-btn">Reset Terrarium</button>
    </div>

    <script src="./script.js" defer></script>
</body>
</html>
