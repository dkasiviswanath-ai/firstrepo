<!DOCTYPE html>
<html lang="en">

<head>
    <title> My Garden</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <h1> Welcome to My Garden </h1>
    <div id="page">
        <div id="left-container" class="container">
            <div class="plant-holder">
                <img class="plant" id="plant1" src="./images/image1.jpg" alt="tall cactus" >
            </div>
            <div class="plant-holder">
                <img class="plant" id="plant2" src="./images/image2.jpg" alt="small cactus" >
            </div>
            <div class="plant-holder">
                <img class="plant" id="plant3" src="./images/image3.jpg" alt="round cactus">
            </div>
        </div>

        <div id="right-container" class="container">
            <div class="plant-holder">
                <img class="plant" id="plant4" src="./images/image4.jpg" alt="tall cactus" >
            </div>
            <div class="plant-holder">
                <img class="plant" id="plant5" src="./images/image5.jpg" alt="small cactus" >
            </div>
            <div class="plant-holder">
                <img class="plant" id="plant6" src="./images/image6.jpg" alt="round cactus">
            </div>
        </div>

        <div id="terrarium">
            <div class="jar-top"></div>
            <div class="jar-walls"></div>
            <div class="jar-glossy-long"></div>
            <div class="jar-glossy-short"></div>
            <div class="dirt"></div>
        </div>

    </div>
</body>

</html>
